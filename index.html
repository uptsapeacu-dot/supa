<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Controle de Frequência</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>

    body{
      font-family: Arial;
      max-width: 700px;
      margin:auto;
      padding:20px;
      background:#f5f5f5;
    }

    h1{
      text-align:center;
    }

    .topo{
      margin:20px 0;
    }

    .aluno{
      background:white;
      padding:15px;
      border-radius:10px;
      margin-top:10px;

      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    button{
      width:100%;
      margin-top:20px;
      padding:15px;
      border:none;
      border-radius:10px;
      font-size:16px;
      cursor:pointer;
    }

  </style>

</head>
<body>

  <h1>Controle de Frequência</h1>

  <div class="topo">
    <label>Escolha a data:</label>
    <input type="date" id="data">
  </div>

  <div id="lista"></div>

  <button onclick="salvarFrequencia()">
    Salvar Frequência
  </button>

  <script>

    const supabaseUrl =
      'https://mkgvobuacvuxcgedpfbf.supabase.co'

    const supabaseKey =
      'sb_publishable_QqQ80GSvg3MhddrqpYsjmg_uMlJsKDH'

    const clienteSupabase =
      window.supabase.createClient(
        supabaseUrl,
        supabaseKey
      )

    let alunos = []

    async function carregarAlunos(){

      const { data, error } =
        await clienteSupabase
          .from('alunos')
          .select('*')
          .order('nome')

      if(error){
        console.log(error)
        alert('Erro ao carregar alunos')
        return
      }

      alunos = data

      const lista =
        document.getElementById('lista')

      lista.innerHTML = ''

      alunos.forEach(aluno => {

        lista.innerHTML += `
          <div class="aluno">

            <span>${aluno.nome}</span>

            <select id="status-${aluno.id}">

              <option value="presente">
                Presente
              </option>

              <option value="ausente">
                Ausente
              </option>

            </select>

          </div>
        `
      })
    }

    async function salvarFrequencia(){

      const dataSelecionada =
        document.getElementById('data').value

      if(!dataSelecionada){
        alert('Escolha uma data')
        return
      }

      for(const aluno of alunos){

        const status =
          document.getElementById(
            `status-${aluno.id}`
          ).value

        const { error } =
          await clienteSupabase
            .from('frequencia')
            .insert([
              {
                aluno_id: aluno.id,
                data: dataSelecionada,
                status: status
              }
            ])

        if(error){
          console.log(error)
          alert('Erro ao salvar frequência')
          return
        }
      }

      alert('Frequência salva com sucesso!')
    }

    carregarAlunos()

  </script>

</body>
</html>
