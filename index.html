<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Frequência - Chamada UPT</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    :root {
      --bg-principal: #f1f3f6;
      --sidebar-dark: #0b192c; /* Azul escuro idêntico ao da imagem */
      --sidebar-hover: rgba(255, 255, 255, 0.08);
      --sidebar-ativo: rgba(255, 255, 255, 0.15);
      --azul-primary: #0d6efd;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg-principal);
      color: #333;
    }

    /* TELA DE LOGIN */
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f1f3f6;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    .login-box h2 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 25px;
      color: var(--azul-primary);
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 14px;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border: none;
      border-radius: 8px;
      background: var(--azul-primary);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover {
      background: #0b5ed7;
    }

    /* ESTRUTURA DO APLICATIVO (PÓS-LOGIN) */
    #app-container {
      display: none; /* Só aparece após login */
    }

    /* SIDEBAR ESTILO COMPLETO DA IMAGEM */
    .sidebar {
      width: 250px;
      height: 100vh;
      background: var(--sidebar-dark);
      position: fixed;
      left: 0;
      top: 0;
      color: white;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      z-index: 100;
    }

    .sidebar.fechado {
      width: 70px;
    }

    .sidebar-top {
      display: flex;
      flex-direction: column;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      padding: 20px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    .sidebar.fechado .logo {
      opacity: 0;
      padding: 20px 0;
      height: 0;
      overflow: hidden;
      border-bottom: none;
    }

    .menu-btn {
      width: 100%;
      border: none;
      background: none;
      color: white;
      font-size: 20px;
      padding: 15px;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s;
    }

    .menu-btn:hover {
      background: var(--sidebar-hover);
    }

    .menu {
      display: flex;
      flex-direction: column;
      margin-top: 10px;
    }

    .menu button {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.8);
      padding: 16px 22px;
      text-align: left;
      cursor: pointer;
      font-size: 15px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      white-space: nowrap;
      border-radius: 0;
    }

    .menu button span.icon {
      font-size: 18px;
      margin-right: 15px;
      min-width: 25px;
      text-align: center;
    }

    .menu button span.text {
      transition: opacity 0.2s;
    }

    /* Quando fechar a barra, esconde o texto mantendo o ícone centralizado */
    .sidebar.fechado .menu button span.text {
      opacity: 0;
      pointer-events: none;
    }

    .sidebar.fechado .menu button {
      padding: 16px 0;
      justify-content: center;
    }

    .sidebar.fechado .menu button span.icon {
      margin-right: 0;
    }

    .
