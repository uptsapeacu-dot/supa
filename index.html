<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Chamada UPT</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial;
      background:#f1f3f6;
    }

    /* LOGIN */

    .login-container{
      width:100%;
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;
    }

    .login-box{
      width:400px;
      background:white;
      padding:30px;
      border-radius:15px;
      box-shadow:0 0 15px rgba(0,0,0,0.1);
    }

    .login-box h2{
      text-align:center;
      color:#0d6efd;
      margin-bottom:25px;
    }

    input, select{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:1px solid #ccc;
      border-radius:8px;
    }

    button{
      border:none;
      cursor:pointer;
    }

    .btn-login{
      width:100%;
      padding:12px;
      margin-top:20px;
      border-radius:8px;
      background:#0d6efd;
      color:white;
      font-size:16px;
    }

    /* APP */

    #app{
      display:none;
    }

    /* SIDEBAR */

    .sidebar{
      width:240px;
      height:100vh;
      background:#0d6efd;

      position:fixed;
      left:0;
      top:0;

      color:white;

      transition:0.3s;
      overflow:hidden;
    }

    .sidebar.fechado{
      width:70px;
    }

    .logo{
      font-size:24px;
      font-weight:bold;
      text-align:center;
      padding:25px 10px;

      border-bottom:1px solid rgba(255,255,255,0.2);
    }

    .menu-btn{
      width:100%;
      background:none;
      color:white;
      font-size:24px;
      padding:15px;
    }

    .menu{
      display:flex;
      flex-direction:column;
    }

    .menu button{
      background:none;
      color:white;
      padding:18px;
      text-align:left;
      font-size:16px;
      transition:0.2s;
    }

    .menu button:hover{
      background:rgba(255,255,255,0.15);
    }

    /* CONTEÚDO */

    .conteudo{
      margin-left:240px;
      padding:30px;
      transition:0.3s;
    }

    .sidebar.fechado + .conteudo{
      margin-left:70px;
    }

    h1{
      margin-top:0;
    }

    /* FREQUÊNCIA */

    .aluno{
      background:white;
      padding:15px;
      border-radius:10px;
      margin-top:10px;

      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .btn-salvar{
      width:100%;
      padding:15px;
      margin-top:20px;

      border-radius:10px;

      background:#0d6efd;
      color:white;
      font-size:16px;
    }

    /* ALUNOS */

    .topo-alunos{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .btn-add{
      width:50px;
      height:50px;

      border-radius:50%;

      background:#0d6efd;
      color:white;

      font-size:30px;
    }

    .item-aluno{
      background:white;
      padding:15px;
      border-radius:10px;
      margin-top:10px;

      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .btn-editar{
      width:45px;
      height:45px;

      border-radius:50%;

      background:#0d6efd;
      color:white;

      font-size:18px;
    }

    /* MODAL */

    .modal{
      position:fixed;
      top:0;
      left:0;

      width:100%;
      height:100%;

      background:rgba(0,0,0,0.5);

      display:none;

      justify-content:center;
      align-items:center;

      z-index:999;
    }

    .modal-box{
      width:80%;
      max-width:500px;

      background:white;

      border-radius:15px;

      padding:20px;
    }

    .modal-topo{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .fechar{
      width:40px;
      height:40px;

      border-radius:50%;

      background:red;
      color:white;
    }

  </style>

</head>
<body>

  <div class="login-container" id="loginBox">

    <div class="login-box">

      <h2>Chamada UPT</h2>

      <input
        type="email"
        id="email"
        placeholder="Usuário"
      >

      <input
        type="password"
        id="senha"
        placeholder="Senha"
      >

      <button
        class="btn-login"
        onclick="fazerLogin()"
      >
        Entrar
      </button>

    </div>

  </div>

  <div id="app">

    <div class="sidebar" id="sidebar">

      <div class="logo">
        Chamada UPT
      </div>

      <button
        class="menu-btn"
        onclick="toggleSidebar()"
      >
        ☰
      </button>

      <div class="menu">

        <button onclick="mostrarTela('frequencia')">
          📋 Frequência
        </button>

        <button onclick="mostrarTela('alunos')">
          👨‍🎓 Alunos
        </button>

        <button onclick="mostrarTela('relatorios')">
          📊 Relatórios
        </button>

        <button onclick="logout()">
          🚪 Sair
        </button>

      </div>

    </div>

    <div class="conteudo">

      <div id="frequencia">

        <h1>Controle de Frequência</h1>

        <input type="date" id="data">

        <div id="lista"></div>

        <button
          class="btn-salvar"
          onclick="salvarFrequencia()"
        >
          Salvar Frequência
        </button>

      </div>

      <div id="alunos" style="display:none">

        <div class="topo-alunos">

          <h1>Alunos</h1>

          <button
            class="btn-add"
            onclick="abrirModalAluno()"
          >
            +
          </button>

        </div>

        <div id="listaAlunos"></div>

      </div>

      <div id="relatorios" style="display:none">

        <h1>Relatórios</h1>

        <p>Área de relatórios futuramente.</p>

      </div>

    </div>

  </div>

  <div class="modal" id="modalAluno">

    <div class="modal-box">

      <div class="modal-topo">

        <h2 id="tituloModal">
          Novo Aluno
        </h2>

        <button
          class="fechar"
          onclick="fecharModalAluno()"
        >
          ✕
        </button>

      </div>

      <input
        type="text"
        id="nomeAluno"
        placeholder="Nome do aluno"
      >

      <input
        type="text"
        id="telefoneAluno"
        placeholder="Telefone"
      >

      <input
        type="email"
        id="emailAluno"
        placeholder="Email"
      >

      <input
        type="text"
        id="enderecoAluno"
        placeholder="Endereço"
      >

      <input
        type="text"
        id="serieAluno"
        placeholder="Série"
      >

      <button
        class="btn-login"
        onclick="salvarAluno()"
      >
        Salvar
      </button>

    </div>

  </div>

  <script>

    const supabaseKey =

    const clienteSupabase =
      window.supabase.createClient(
        supabaseUrl,
        supabaseKey
      )

    async function fazerLogin(){

      const email =
        document.getElementById('email').value

      const senha =
        document.getElementById('senha').value

      const { error } =
        await clienteSupabase.auth.signInWithPassword({
          email: email,
          password: senha
        })

      if(error){
        alert('Login inválido')
        return
      }

      iniciarSistema()
    }

    async function iniciarSistema(){

      document.getElementById('loginBox')
        .style.display = 'none'

      document.getElementById('app')
        .style.display = 'block'

      carregarAlunos()
    }

    async function logout(){

      await clienteSupabase.auth.signOut()

      location.reload()
    }

    async function verificarLogin(){

      const {
        data: { session }
      } = await clienteSupabase.auth.getSession()

      if(session){
        iniciarSistema()
      }
    }

    verificarLogin()

      document

        .classList
        .toggle('fechado')
    }

      document.getElementById(tela)
