<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <title>Sapeaçu Painel Escolar</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="styles/print-base.css">
  <link rel="stylesheet" href="styles/print-ficha.css">
  <link rel="stylesheet" href="styles/print-boletim.css">
  <link rel="stylesheet" href="styles/print-relatorio.css">
  <link rel="icon" type="image/png" href="img/favSapeacu.png">

  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#0f0f0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="SPE">




</head>

<body>

  <!-- LOGIN -->

  <div class="login-container" id="loginBox">
    <div class="login-box">

      <h2>Sapeaçu Painel Escolar</h2>

      <input type="email" id="email" placeholder="Email" autocomplete="email" />
      <input type="password" id="senha" placeholder="Senha" autocomplete="current-password" />

      <button class="btn-login" id="btnLogin" onclick="fazerLogin()">
        Entrar
      </button>

    </div>
  </div>

  <!-- APP -->

  <div id="app">

    <div class="overlay" id="overlay" onclick="fecharSidebarMobile()"></div>

    <!-- SIDEBAR -->

    <aside class="sidebar" id="sidebar">

      <div class="brand-row">
        <button class="toggle-sidebar" onclick="toggleSidebar()" title="Recolher menu" aria-label="Recolher menu">
          ☰
        </button>
        <div class="brand">
          <img class="brand-logo" src="img/brasaoSapeaçu.png" alt="Brasão">
          <span>Painel Escolar</span>
        </div>
      </div>

      <!-- MENU -->
      <nav class="menu">
        <button id="menu-home" onclick="mostrarTela('home')" title="Início">
          <span class="menu-icon"><i data-lucide="house"></i></span>
          <span class="menu-text">Início</span>
        </button>
        <button id="menu-mural" onclick="mostrarTela('mural')" title="Mural">
          <span class="menu-icon"><i data-lucide="pin"></i></span>
          <span class="menu-text">Mural</span>
        </button>
        <button id="menu-turmas" onclick="mostrarTela('turmas')" title="Turmas" style="display:none">
          <span class="menu-icon"><i data-lucide="book-open"></i></span>
          <span class="menu-text">Turmas</span>
        </button>

        <button id="menu-funcionarios" onclick="mostrarTela('funcionarios')" title="Funcionários" style="display:none">
          <span class="menu-icon"><i data-lucide="users"></i></span>
          <span class="menu-text">Funcionários</span>
        </button>
        <button id="menu-matriculas" onclick="mostrarTela('matriculas')" title="Matrículas" style="display:none">
          <span class="menu-icon"><i data-lucide="file-text"></i></span>
          <span class="menu-text">Matrículas</span>
        </button>
        <button id="menu-alunos" onclick="mostrarTela('alunos')" title="Alunos" style="display:none">
          <span class="menu-icon"><i data-lucide="graduation-cap"></i></span>
          <span class="menu-text">Alunos</span>
        </button>
        <button id="menu-permissoes" onclick="mostrarTela('permissoes')" title="Permissões" style="display:none">
          <span class="menu-icon"><i data-lucide="shield-check"></i></span>
          <span class="menu-text">Permissões</span>
        </button>
        <button id="menu-relatorios" onclick="mostrarTela('relatorios')" title="Relatórios" style="display:none">
          <span class="menu-icon"><i data-lucide="bar-chart-2"></i></span>
          <span class="menu-text">Relatórios</span>
        </button>

        <button id="menu-diretrizes" onclick="mostrarTela('diretrizes')" title="Ajuda do Sistema">
          <span class="menu-icon"><i data-lucide="help-circle"></i></span>
          <span class="menu-text">Ajuda</span>
        </button>
        <button id="menu-ajuda-chefe" onclick="mostrarTela('ajuda-chefe')" title="Ajuda do Chefe" style="display:none">
          <span class="menu-icon"><i data-lucide="help-circle"></i></span>
          <span class="menu-text">Ajuda</span>
        </button>
        <!-- <button id="menu-financeiro" onclick="mostrarTela('financeiro')" title="Financeiro" style="display:none">
          <span class="menu-icon"><i data-lucide="wallet"></i></span>
          <span class="menu-text">Financeiro</span>
        </button> -->
        <button id="menu-ponto-mobile" onclick="mostrarTela('ponto-mobile')" title="Ponto Eletrônico" style="display:none">
          <span class="menu-icon"><i data-lucide="scan-line"></i></span>
          <span class="menu-text">Bater Ponto</span>
        </button>
        <div id="menu-dinamico-chefias"></div>
        <button id="menu-perfil" onclick="mostrarTela('perfil')" title="Perfil" style="display:none">
          <span class="menu-icon"><i data-lucide="circle-user"></i></span>
          <span class="menu-text">Perfil</span>
        </button>
      </nav>

      <!-- LOGOUT -->
      <div class="logout-area">
        <div class="menu">
          <button onclick="forcarAtualizacaoCache()" title="Limpar Cache e Atualizar Sistema">
            <span class="menu-icon"><i data-lucide="refresh-cw"></i></span>
            <span class="menu-text">Atualizar</span>
          </button>
          <button onclick="logout()" title="Sair">
            <span class="menu-icon"><i data-lucide="log-out"></i></span>
            <span class="menu-text">Sair</span>
          </button>
        </div>
      </div>

    </aside>

    <!-- CONTEÚDO -->

    <main class="conteudo" id="conteudo">

      <!-- GLOBAL HEADER WITH MODE TOGGLE -->
      <div class="global-header">
        <div class="global-header-left">
          <div class="global-header-title">Sapeaçu Painel Escolar</div>
          <span class="global-header-school header-escola-nome"></span>
        </div>
        <div style="display:flex; align-items:center; gap:20px;">
          <!-- SINO DE NOTIFICAÇÕES -->
          <div class="notificacoes-bell" onclick="togglePainelNotificacoes()" style="position:relative; cursor:pointer;">
            <i data-lucide="bell" style="width:22px; height:22px; color:#aaa;"></i>
            <span id="badgeNotificacoesDesktop" style="display:none; position:absolute; top:-5px; right:-5px; background:#ef4444; color:#fff; font-size:10px; font-weight:bold; border-radius:50%; width:16px; height:16px; text-align:center; line-height:16px;">0</span>
          </div>
          
          <div class="mode-toggle-container">
            <span class="mode-text">Modo Visualização</span>
            <label class="switch">
              <input type="checkbox" class="btn-modo-edicao" onchange="tentarAtivarModoEdicao(this.checked)">
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>

      <!-- MOBILE -->
      <div class="topbar-mobile">
        <div class="topbar-mobile-row1">
          <div class="brand">
            <div class="brand-icon">SPE</div>
            <span>Sapeaçu Painel Escolar</span>
          </div>
          <button class="mobile-menu-btn" onclick="abrirSidebarMobile()" aria-label="Abrir menu">
            <i data-lucide="menu"></i>
          </button>
        </div>
        <div class="topbar-mobile-row2">
          <span class="global-header-school header-escola-nome"></span>
          <div style="display:flex; align-items:center; gap:16px;">
            <!-- SINO MOBILE -->
            <div class="notificacoes-bell" onclick="togglePainelNotificacoes()" style="position:relative; cursor:pointer;">
              <i data-lucide="bell" style="width:20px; height:20px; color:#aaa;"></i>
              <span id="badgeNotificacoesMobile" style="display:none; position:absolute; top:-4px; right:-4px; background:#ef4444; color:#fff; font-size:10px; font-weight:bold; border-radius:50%; width:16px; height:16px; text-align:center; line-height:16px;">0</span>
            </div>
            <div class="mode-toggle-container">
              <span class="mode-text">Editar</span>
              <label class="switch">
                <input type="checkbox" class="btn-modo-edicao" onchange="tentarAtivarModoEdicao(this.checked)">
                <span class="slider"></span>
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- HOME -->
      <section id="home"></section>

      <!-- ESCOLA -->
      <section id="escola" style="display:none"></section>

      <!-- MURAL -->
      <section id="mural" style="display:none"></section>

      <!-- TURMAS -->
      <section id="turmas" style="display:none"></section>

      <!-- FUNCIONÁRIOS -->
      <section id="funcionarios" style="display:none"></section>

      <!-- MATRÍCULAS -->
      <section id="matriculas" style="display:none"></section>

      <!-- ALUNOS -->
      <section id="alunos" style="display:none"></section>

      <!-- OCORRÊNCIAS -->
      <section id="ocorrencias" style="display:none"></section>
      <section id="painel-chefe" style="display:none"></section>
      <section id="ponto-mobile" style="display:none"></section>

      <!-- PERMISSÕES -->
      <div id="tela-financeiro" class="tela" style="display:none;"></div>
      <div id="tela-ponto-mobile" class="tela" style="display:none;"></div>
      <section id="ajuda-chefe" style="display:none"></section>
      <section id="permissoes" style="display:none"></section>
      <section id="relatorios" style="display:none"></section>
      <section id="calendario" style="display:none"></section>
      <section id="perfil" style="display:none"></section>

      <!-- FINANCEIRO -->
      <section id="financeiro" style="display:none"></section>

      <!-- PERFIL -->
      <section id="perfil" style="display:none"></section>

      <!-- RELATÓRIOS -->
      <section id="relatorios" style="display:none"></section>

      <!-- DIRETRIZES -->
      <section id="diretrizes" style="display:none"></section>

      <!-- HISTÓRICO DE NOTIFICAÇÕES -->
      <section id="historico-notificacoes" style="display:none"></section>

    </main>

  </div>

  <!-- Os modais pesados vão ser carregados dinamicamente aqui -->
  <div id="container-modal-escola"></div>
  <div id="container-modal-confirmacao-senha"></div>
  <div id="container-modal-aniversariante"></div>
  <div id="container-modal-funcionario"></div>
  <div id="container-modal-movimentacoes"></div>
  <div id="container-modal-sucesso"></div>
  
  <div id="container-modal-aluno"></div>
  <div id="container-ficha-impressao"></div>
  <div id="container-boletim-impressao"></div>
  <div id="container-modal-primeiro-acesso"></div>
  
  <!-- NOTIFICAÇÕES E TRANSFERÊNCIAS -->
  <div id="container-modal-notificacoes"></div>
  <div id="container-modal-transferir-aluno"></div>
  <div id="container-modal-detalhes-transferencia"></div>
  <div id="container-modal-detalhes-notificacao"></div>
  <div id="container-modal-report"></div>
  
</main>
</div>

  <!-- SCRIPTS -->
  <script src="js/estado-global.js"></script>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/primeiro-acesso.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/escolas.js"></script>
  <script src="js/alunos.js"></script>
  <script src="js/funcionarios.js"></script>
  <script src="js/notificacoes.js"></script>
  <script src="js/ocorrencias.js"></script>
  <script src="js/permissoes.js"></script>
  <script src="js/mural.js"></script>
  <script src="js/turmas.js"></script>
  <script src="js/financeiro.js"></script>
  <script src="js/perfil.js"></script>
  <script src="js/ajuda.js"></script>
  <script src="js/relatorios-utils.js"></script>
  <script src="js/relatorios-globais.js"></script>
  <script src="js/relatorios-escola.js"></script>
  <script src="js/ocorrencias.js"></script>
  <script src="js/mapa-funcionarios.js"></script>
  <script src="js/painel-chefe.js"></script>
  <script src="js/ponto-mobile.js"></script>

  <script>
    let promiseComponentes;

    // Função para carregar os HTMLs pesados em paralelo e de forma resiliente
    async function carregarComponentes() {
      const components = [
        { url: 'htmls/home.html', target: 'home' },
        { url: 'htmls/escola.html', target: 'escola' },
        { url: 'htmls/mural.html', target: 'mural' },
        { url: 'htmls/matriculas.html', target: 'matriculas' },
        { url: 'htmls/alunos.html', target: 'alunos' },
        { url: 'htmls/ocorrencias.html', target: 'ocorrencias' },
        { url: 'htmls/permissoes.html', target: 'permissoes' },
        { url: 'htmls/perfil.html', target: 'perfil' },
        { url: 'htmls/turmas-lista.html', target: 'turmas' },
        { url: 'htmls/funcionarios-lista.html', target: 'funcionarios' },
        { url: 'htmls/financeiro.html', target: 'financeiro' },
        { url: 'htmls/ajuda.html', target: 'diretrizes' },
        { url: 'htmls/relatorios.html', target: 'relatorios' },
        { url: 'htmls/calendario-global.html', target: 'calendario' },
        { url: 'htmls/ficha-impressao.html', target: 'container-ficha-impressao' },
        { url: 'htmls/boletim-impressao.html', target: 'container-boletim-impressao' },
        { url: 'htmls/modais/modal-aluno.html', target: 'container-modal-aluno' },
        { url: 'htmls/modais/modal-escola.html', target: 'container-modal-escola' },
        { url: 'htmls/modais/modal-confirmacao-senha.html', target: 'container-modal-confirmacao-senha' },
        { url: 'htmls/modais/modal-aniversariante.html', target: 'container-modal-aniversariante' },
        { url: 'htmls/modais/modal-funcionario.html', target: 'container-modal-funcionario' },
        { url: 'htmls/modais/modal-movimentacoes.html', target: 'container-modal-movimentacoes' },
        { url: 'htmls/modais/modal-sucesso.html', target: 'container-modal-sucesso' },
        { url: 'htmls/modais/modal-primeiro-acesso.html', target: 'container-modal-primeiro-acesso' },
        { url: 'htmls/modais/modal-notificacoes.html', target: 'container-modal-notificacoes' },
        { url: 'htmls/modais/modal-transferir-aluno.html', target: 'container-modal-transferir-aluno' },
        { url: 'htmls/modais/modal-detalhes-transferencia.html', target: 'container-modal-detalhes-transferencia' },
        { url: 'htmls/modais/modal-detalhes-notificacao.html', target: 'container-modal-detalhes-notificacao' },
        { url: 'htmls/modais/modal-report.html', target: 'container-modal-report' },
        { url: 'htmls/historico-notificacoes.html', target: 'historico-notificacoes' },
        { url: 'htmls/painel-chefe.html', target: 'painel-chefe' },
        { url: 'htmls/ponto-mobile.html', target: 'ponto-mobile' },
        { url: 'htmls/ajuda-chefe.html', target: 'ajuda-chefe' }
      ];

      await Promise.allSettled(components.map(async (comp) => {
        try {
          const res = await fetch(comp.url);
          if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
          document.getElementById(comp.target).innerHTML = await res.text();
        } catch (error) {
          console.error(`Erro ao carregar componente ${comp.url}:`, error);
        }
      }));

      console.log("Componentes externos carregados com sucesso!");
    }

    // Inicialização segura: aguarda os componentes antes de seguir
    async function iniciarApp() {
      promiseComponentes = carregarComponentes();
      await promiseComponentes;
      if (window.lucide) lucide.createIcons();
      verificarLogin();
    }

    // Dispara a função assim que o site abre
    iniciarApp();
  </script>

  <!-- Biblioteca de Leitura de QR Code via Câmera (Para o Ponto Mobile) -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <!-- ADMIN CORE: carregado aqui pois iniciarSistema() pode chamar carregarPainelSuperAdmin() -->
  <script src="admin/admin-core.js?v=5"></script>

</body>
</html>
