<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<div class="page-header">
  <h1 id="tituloRelatorio">Relatórios</h1>
  <button class="btn-editar" onclick="imprimirRelatorio()" title="Imprimir relatório" style="display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;width:auto;">
    <i data-lucide="printer" style="width:16px;height:16px;"></i> Imprimir
  </button>
</div>

<div class="relatorios-tabs" style="display:flex; gap:16px; border-bottom: 1px solid #333; margin-bottom: 24px;">
  <button class="tab-btn active" onclick="mudarAbaRelatorio('desempenho')" id="tab-desempenho" style="background:none; border:none; color:#fff; padding:8px 16px; cursor:pointer; border-bottom: 2px solid #3ea6ff;">Desempenho Escolar</button>
  <button class="tab-btn" onclick="mudarAbaRelatorio('frequencia')" id="tab-frequencia" style="background:none; border:none; color:#aaa; padding:8px 16px; cursor:pointer; border-bottom: 2px solid transparent;">Frequência e Evasão</button>
  <button class="tab-btn" onclick="mudarAbaRelatorio('censo')" id="tab-censo" style="background:none; border:none; color:#aaa; padding:8px 16px; cursor:pointer; border-bottom: 2px solid transparent;">Censo e Logística</button>
  <button class="tab-btn" onclick="mudarAbaRelatorio('ocorrencias')" id="tab-ocorrencias" style="background:none; border:none; color:#aaa; padding:8px 16px; cursor:pointer; border-bottom: 2px solid transparent;">Ocorrências</button>
  <button class="tab-btn" onclick="mudarAbaRelatorio('mapas')" id="tab-mapas" style="background:none; border:none; color:#aaa; padding:8px 16px; cursor:pointer; border-bottom: 2px solid transparent;">🗺️ Mapa Logístico</button>
</div>

<!-- CONTAINER DE IMPRESSÃO (Recebe classe no body via JS) -->
<div id="relatorioImpressaoContainer">
  <!-- Aba Desempenho -->
  <div id="relatorio-desempenho" class="relatorio-aba">
    <div id="conteudo-desempenho"><div class="empty-state">Carregando relatórios de desempenho...</div></div>
  </div>

  <!-- Aba Frequencia -->
  <div id="relatorio-frequencia" class="relatorio-aba" style="display:none;">
    <div id="relatorio-conteudo-frequencia"><div class="empty-state">Carregando relatórios de frequência...</div></div>
  </div>

  <!-- Aba Censo -->
  <div id="relatorio-censo" class="relatorio-aba" style="display:none;">
    <div id="conteudo-censo"><div class="empty-state">Carregando relatórios de censo...</div></div>
  </div>

  <!-- Aba Ocorrências -->
  <div id="relatorio-ocorrencias" class="relatorio-aba" style="display:none;">
    <div id="conteudo-ocorrencias"><div class="empty-state">Carregando relatórios de ocorrências...</div></div>
  </div>

  <!-- Aba Mapa Logístico -->
  <div id="relatorio-mapas" class="relatorio-aba" style="display:none;">
    <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:16px;">
      <input type="text" id="buscaMapaFuncionario" placeholder="Filtrar por nome, cargo ou escola..." oninput="filtrarPinsNoMapa()" style="flex:1; min-width:200px;" />
    </div>
    <div id="mapaFuncionarios" style="width:100%; height:520px; border-radius:12px; overflow:hidden; border:1px solid #333;"></div>
    <p id="mapaFuncionariosInfo" style="text-align:center; color:#666; font-size:13px; margin-top:8px;">Carregando mapa...</p>
  </div>
</div>

<!-- CONTAINER DE IMPRESSÃO PROFISSIONAL (Oculto na tela, visível na impressão) -->
<div id="relatorioImpressaoProfissional" style="display:none;">
  <div class="print-header">
    <img src="img/logo-prefeitura.png" alt="Prefeitura de Sapeaçu">
    <div class="print-title">
      <h1 id="printRelatorioTitulo">Relatório</h1>
      <h2 id="printRelatorioSubtitulo">Rede Municipal</h2>
    </div>
    <img src="img/logo-secretaria.png" alt="Secretaria Municipal de Educação">
  </div>
  <div id="printRelatorioConteudo"></div>
</div>
