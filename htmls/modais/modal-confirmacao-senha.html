  <div class="modal" id="modalConfirmacaoSenha">
    <div class="modal-box" style="max-width: 400px;">
      <div class="modal-topo">
        <h2 style="display:flex;align-items:center;gap:8px;"><i data-lucide="lock" style="width:20px;height:20px;"></i> Ativar Modo Edição</h2>
        <button class="fechar" onclick="cancelarModoEdicao()" aria-label="Fechar modal">×</button>
      </div>
      <p style="font-size: 14px; color: #aaa; margin: 0 0 16px; line-height: 1.4;">Para alternar para o modo de edição, confirme sua senha de login.</p>
      
      <!-- 👇 OLHA A MÁGICA DO ENTER AQUI NESSA LINHA 👇 -->
      <input type="password" id="senhaConfirmacao" placeholder="Senha do usuário" onkeypress="if(event.key === 'Enter') confirmarSenhaModoEdicao()" />
      
      <button class="btn-login" id="btnConfirmarSenha" onclick="confirmarSenhaModoEdicao()">Confirmar</button>
    </div>
  </div>
