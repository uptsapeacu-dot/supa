  <div class="modal" id="modalFuncionario">
    <div class="modal-box" style="max-width: 560px; max-height: 90vh; overflow-y: auto;">
      <div class="modal-topo" style="position: sticky; top: 0; background: #181818; z-index: 10; padding-bottom: 12px; border-bottom: 1px solid #2a2a2a;">
        <h2 id="tituloModalFuncionario">Novo Funcionário</h2>
        <button class="fechar" onclick="fecharModalFuncionario()" aria-label="Fechar modal">×</button>
      </div>

      <div class="form-section-title" style="margin-top: 16px;">Dados Pessoais</div>
      <div class="form-grid-2">
        <div>
          <label style="display:block; margin-bottom:4px; font-size:13px; color:#aaa;">Nome Completo *</label>
          <input type="text" id="nomeFuncionario" placeholder="Nome completo" style="margin:0;" />
        </div>
        <div>
          <label style="display:block; margin-bottom:4px; font-size:13px; color:#aaa;">CPF</label>
          <input type="text" id="cpfFuncionario" placeholder="000.000.000-00" style="margin:0;" />
        </div>
      </div>
      <div class="form-grid-2">
        <div>
          <label style="display:block; margin-bottom:4px; font-size:13px; color:#aaa;">Email *</label>
          <input type="email" id="emailFuncionario" placeholder="email@exemplo.com" style="margin:0;" />
        </div>
        <div>
          <label style="display:block; margin-bottom:4px; font-size:13px; color:#aaa;">Telefone</label>
          <input type="text" id="telefoneFuncionario" placeholder="(00) 00000-0000" style="margin:0;" />
        </div>
      </div>
      <div class="form-grid-2">
        <div>
          <label style="display:block; margin-bottom:4px; font-size:13px; color:#aaa;">Data de Nascimento</label>
          <input type="date" id="nascimentoFuncionario" style="margin:0;" />
        </div>
        <div>
          <label style="display:block; margin-bottom:4px; font-size:13px; color:#aaa;">Status</label>
          <select id="statusFuncionario" style="margin:0;">
            <option value="ativo">Ativo</option>
            <option value="afastado">Afastado</option>
            <option value="desligado">Desligado</option>
          </select>
        </div>
      </div>

      <div class="form-section-title">Formação e Endereço</div>
      <div>
        <label style="display:block; margin-bottom:4px; font-size:13px; color:#aaa;">Formação Acadêmica</label>
        <input type="text" id="formacaoFuncionario" placeholder="Ex: Licenciatura em Pedagogia, Ensino Médio..." style="margin:0 0 12px 0;" />
      </div>
      <div>
        <label style="display:block; margin-bottom:4px; font-size:13px; color:#aaa;">Endereço</label>
        <div style="display:flex; gap:8px; align-items:center;">
          <input type="text" id="enderecoFuncionario" placeholder="Rua, número, bairro, cidade" style="margin:0; flex:1;" oninput="_funcEnderecoInput(this.value)" />
          <button type="button" onclick="geocodificarEndereco()" title="Buscar no mapa" style="padding:10px 14px; background:#3ea6ff; border:none; border-radius:8px; color:#000; font-weight:700; cursor:pointer; white-space:nowrap; font-size:13px; display:flex; align-items:center; gap:6px;"><i data-lucide="search" style="width:16px;height:16px;"></i> Buscar</button>
        </div>
      </div>

      <!-- Mini-mapa GPS (oculto na impressao) -->
      <div class="ocultar-na-impressao" style="margin-top:12px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
          <label style="font-size:13px; color:#aaa; display:flex; align-items:center; gap:6px;"><i data-lucide="map-pin" style="width:14px;height:14px;"></i> Localização no Mapa <span style="font-size:11px; color:#666;">(arraste o alfinete para corrigir)</span></label>
          <a id="btnVerGoogleMaps" href="#" target="_blank" style="display:none; font-size:12px; color:#3ea6ff; text-decoration:none; gap:4px; align-items:center;" onclick="_abrirGoogleMapsFunc()">
            <i data-lucide="external-link" style="width:14px;height:14px;"></i> Ver no Google Maps
          </a>
        </div>
        <div id="miniMapFuncionario" style="width:100%; height:220px; border-radius:10px; overflow:hidden; border:1px solid #333; background:#1a1a1a;"></div>
        <div style="display:flex; gap:10px; margin-top:8px;">
          <div style="flex:1;">
            <label style="font-size:11px; color:#555; display:block; margin-bottom:2px;">Latitude</label>
            <input type="number" step="any" id="latFuncionario" placeholder="Ex: -12.9714" style="margin:0; font-size:13px; background:#111; color:#ccc;" oninput="_syncMapFromInput()" />
          </div>
          <div style="flex:1;">
            <label style="font-size:11px; color:#555; display:block; margin-bottom:2px;">Longitude</label>
            <input type="number" step="any" id="lngFuncionario" placeholder="Ex: -38.5014" style="margin:0; font-size:13px; background:#111; color:#ccc;" oninput="_syncMapFromInput()" />
          </div>
        </div>
      </div>

      <div class="form-section-title">Cargo e Vínculo</div>
      <label style="display:block; margin-bottom:4px; font-size:13px; color:#aaa;">Cargo / Função</label>
      <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 12px;">
        <select id="cargoFuncionario" style="flex: 1; margin: 0;"></select>
      </div>

      <div id="statusObservacaoBox" style="display:none;">
        <label style="display:block; margin-bottom:4px; font-size:13px; color:#aaa;">Motivo / Observação da mudança de status</label>
        <input type="text" id="statusObservacao" placeholder="Ex: Licença médica, aposentadoria..." style="margin:0 0 12px 0;" />
      </div>

      <div class="form-section-title">Foto 3x4</div>
      <input type="file" id="fotoFuncionario" accept="image/*" style="width: 100%; padding: 8px; font-size: 13px; border-radius: 8px; border: 1px solid #3f3f3f; background: #121212; color: #fff; margin-bottom: 16px;" />

      <button class="btn-login" id="btnSalvarFuncionario" onclick="salvarFuncionario()">Salvar</button>
    </div>
  </div>
