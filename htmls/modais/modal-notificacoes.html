<div id="modalNotificacoes" style="display:none; position:fixed; top:60px; right:20px; width:350px; background:#18181b; border:1px solid #3f3f46; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.5); z-index:9999; flex-direction:column; max-height:80vh;">
  <div style="padding:16px; border-bottom:1px solid #3f3f46; display:flex; justify-content:space-between; align-items:center;">
    <h3 style="margin:0; font-size:16px; color:#fff; display:flex; align-items:center; gap:8px;">
      <i data-lucide="bell"></i> Notificações
    </h3>
    <button onclick="fecharPainelNotificacoes()" class="admin-btn-icon" style="color:#aaa;">
      <i data-lucide="x" style="width:18px;height:18px;"></i>
    </button>
  </div>
  
  <!-- Filtros -->
  <div style="padding:12px 16px; border-bottom:1px solid #3f3f46; background:#121214; display:flex; gap:10px;">
    <select id="filtroTipoNotificacao" onchange="carregarNotificacoes()" style="flex:1; background:#27272a; border:1px solid #3f3f46; color:#fff; border-radius:6px; padding:6px; font-size:12px;">
      <option value="todas">Todas</option>
      <option value="nao_lidas">Não Lidas</option>
      <option value="transferencias">Transferências</option>
    </select>
  </div>

  <div id="listaNotificacoes" style="flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px;">
    <!-- Lista injetada via JS -->
    <div style="text-align:center; padding:20px; color:#aaa; font-size:13px;">Carregando...</div>
  </div>
</div>
