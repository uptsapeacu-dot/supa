<div id="modalNotificacoes" style="display:none; position:fixed; top:60px; right:20px; width:350px; background:#18181b; border:1px solid #3f3f46; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.5); z-index:9999; flex-direction:column; max-height:80vh;">
  <div style="padding:16px; border-bottom:1px solid #3f3f46; display:flex; justify-content:space-between; align-items:center;">
    <h3 style="margin:0; font-size:16px; color:#fff; display:flex; align-items:center; gap:8px;">
      <i data-lucide="bell"></i> Notificações
    </h3>
    <button onclick="fecharPainelNotificacoes()" title="Fechar painel" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #aaa; border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;" onmouseover="this.style.background='rgba(239, 68, 68, 0.15)'; this.style.borderColor='rgba(239, 68, 68, 0.25)'; this.style.color='#ef4444';" onmouseout="this.style.background='rgba(255, 255, 255, 0.05)'; this.style.borderColor='rgba(255, 255, 255, 0.1)'; this.style.color='#aaa';">
      <i data-lucide="x" style="width:16px;height:16px;"></i>
    </button>
  </div>
  
  <!-- Filtros -->
  <div style="padding:12px 16px; border-bottom:1px solid #3f3f46; background:#121214; display:flex; gap:10px;">
    <select id="filtroTipoNotificacao" onchange="carregarNotificacoes()" style="flex:1; background:#27272a; border:1px solid #3f3f46; color:#fff; border-radius:6px; padding:6px; font-size:12px;">
      <option value="todas">Todas</option>
      <option value="nao_lidas">Não Lidas</option>
      <option value="transferencias">Transferências</option>
    </select>
  </div>

  <div id="listaNotificacoes" style="flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px;">
    <!-- Lista injetada via JS -->
    <div style="text-align:center; padding:20px; color:#aaa; font-size:13px;">Carregando...</div>
  </div>
  <div style="padding:12px; border-top:1px solid #3f3f46; background:#121214; display:flex; justify-content:center; align-items:center; border-bottom-left-radius:12px; border-bottom-right-radius:12px;">
    <button onclick="irParaHistoricoNotificacoes()" style="width:100%; padding:8px; border:1px dashed #3ea6ff; color:#3ea6ff; background:transparent; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;" onmouseover="this.style.background='rgba(62,166,255,0.1)'" onmouseout="this.style.background='transparent'">
      <i data-lucide="history" style="width:14px;height:14px;"></i> Ver Histórico Completo
    </button>
  </div>
</div>
