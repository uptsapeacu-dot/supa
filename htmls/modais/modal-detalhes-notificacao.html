<div id="modalDetalhesGeraisNotificacao" class="modal" style="display:none; align-items:center; justify-content:center; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:10000;">
  <div style="background:#18181b; padding:24px; border-radius:12px; width:100%; max-width:450px; border:1px solid #3f3f46; position:relative;">
    <button class="btn-clear" onclick="fecharModalDetalhesGeraisNotificacao()" style="position:absolute; top:16px; right:16px; color:#aaa;">
      <i data-lucide="x"></i>
    </button>
    <h3 style="margin-top:0; color:#fff; display:flex; align-items:center; gap:8px;">
      <i data-lucide="bell" style="color:#3ea6ff;"></i> Detalhes da Notificação
    </h3>
    
    <div style="background:#121214; padding:16px; border-radius:8px; border:1px solid #27272a; margin-bottom:20px; margin-top:16px;">
      <div id="detalhesGeraisNotifTitulo" style="color:#fff; font-size:16px; font-weight:bold; margin-bottom:10px; line-height:1.4;"></div>
      <div id="detalhesGeraisNotifMensagem" style="color:#ccc; font-size:13px; line-height:1.6; white-space:pre-wrap; margin-bottom:12px;"></div>
      <div id="detalhesGeraisNotifData" style="color:#666; font-size:11px;"></div>
    </div>

    <div style="display:flex; justify-content:flex-end;">
      <button class="btn" style="background:#27272a; color:#fff;" onclick="fecharModalDetalhesGeraisNotificacao()">
        Fechar
      </button>
    </div>
  </div>
</div>
