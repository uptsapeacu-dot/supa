<div id="modalDetalhesTransferencia" class="modal" style="display:none; align-items:center; justify-content:center; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:10000;">
  <div style="background:#18181b; padding:24px; border-radius:12px; width:100%; max-width:500px; border:1px solid #3f3f46; position:relative;">
    <button class="btn-clear" onclick="fecharModalDetalhesTransferencia()" style="position:absolute; top:16px; right:16px; color:#aaa;">
      <i data-lucide="x"></i>
    </button>
    <h3 style="margin-top:0; color:#fff; display:flex; align-items:center; gap:8px;">
      <i data-lucide="file-input" style="color:#10b981;"></i> Solicitação de Transferência
    </h3>
    
    <div style="background:#121214; padding:16px; border-radius:8px; border:1px solid #27272a; margin-bottom:16px;">
      <div style="font-size:12px; color:#aaa; margin-bottom:4px;">Aluno Solicitado</div>
      <div id="detalhesTransfNomeAluno" style="color:#fff; font-size:16px; font-weight:bold; margin-bottom:12px;"></div>
      
      <div style="font-size:12px; color:#aaa; margin-bottom:4px;">Escola de Origem</div>
      <div id="detalhesTransfEscolaOrigem" style="color:#fff; font-size:14px; margin-bottom:12px;"></div>
      
      <div style="font-size:12px; color:#aaa; margin-bottom:4px;">Observações da Solicitação</div>
      <div id="detalhesTransfObservacoes" style="color:#ccc; font-size:13px; font-style:italic; background:#000; padding:10px; border-radius:6px; min-height:40px;"></div>
    </div>

    <div id="detalhesTransfAnexosContainer" style="margin-bottom:16px; display:none;">
      <label style="color:#ccc; display:block; margin-bottom:8px; font-size:13px;">Documentos Anexos</label>
      <div id="detalhesTransfListaAnexos" style="display:flex; flex-direction:column; gap:8px;"></div>
    </div>

    <div id="containerMotivoRecusa" style="display:none; margin-bottom:16px;">
      <label style="color:#ef4444; display:block; margin-bottom:8px; font-size:13px;">Motivo da Recusa (Obrigatório)</label>
      <textarea id="detalhesTransfMotivoRecusa" class="form-input" rows="3" style="width:100%; border-color:#ef4444;" placeholder="Descreva por que a escola não pode receber este aluno..."></textarea>
    </div>

    <input type="hidden" id="detalhesTransfId">
    <input type="hidden" id="detalhesTransfAlunoId">

    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:24px;">
      <button class="btn-clear" onclick="fecharModalDetalhesTransferencia()" style="display:flex; align-items:center; gap:6px;">
        <i data-lucide="arrow-left" style="width:16px; height:16px;"></i> Fechar
      </button>
      
      <div id="botoesAcaoTransferencia" style="display:flex; gap:12px;">
        <button class="btn" style="background:#ef4444; color:#fff; display:flex; align-items:center; gap:6px;" onclick="iniciarRecusaTransferencia()" id="btnIniciarRecusa">
          <i data-lucide="x-circle" style="width:16px; height:16px;"></i> Recusar
        </button>
        <button class="btn" style="background:#ef4444; color:#fff; display:none; align-items:center; gap:6px;" onclick="confirmarRecusaTransferencia()" id="btnConfirmarRecusa">
          <i data-lucide="alert-triangle" style="width:16px; height:16px;"></i> Confirmar Recusa
        </button>
        <button class="btn" style="background:#10b981; color:#fff; display:flex; align-items:center; gap:6px; font-weight:600;" onclick="aceitarTransferencia()" id="btnAceitarTransferencia">
          <i data-lucide="check-circle" style="width:16px; height:16px;"></i> Aceitar Aluno
        </button>
      </div>
    </div>
  </div>
</div>
