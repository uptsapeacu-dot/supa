<div id="modalTransferirAluno" class="modal" style="display:none; align-items:center; justify-content:center; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:10000;">
  <div style="background:#18181b; padding:24px; border-radius:12px; width:100%; max-width:450px; border:1px solid #3f3f46; position:relative;">
    <button class="btn-clear" onclick="fecharModalTransferencia()" style="position:absolute; top:16px; right:16px; color:#aaa;">
      <i data-lucide="x"></i>
    </button>
    <h3 style="margin-top:0; color:#fff; display:flex; align-items:center; gap:8px;">
      <i data-lucide="arrow-right-left" style="color:#3ea6ff;"></i> Solicitar Transferência
    </h3>
    
    <p style="color:#aaa; font-size:14px; margin-bottom:20px;">
      Você está solicitando a transferência de <strong id="transfAlunoNome" style="color:#fff;"></strong> para outra escola. A escola de destino precisará aprovar.
    </p>

    <input type="hidden" id="transfAlunoId">
    <input type="hidden" id="transfEscolaOrigemId">

    <div class="form-group" style="margin-bottom:16px;">
      <label style="color:#ccc; display:block; margin-bottom:8px; font-size:13px;">Escola de Destino</label>
      <select id="transfEscolaDestino" class="form-input" style="width:100%;">
        <!-- Injetado via JS -->
      </select>
    </div>

    <div class="form-group" style="margin-bottom:16px;">
      <label style="color:#ccc; display:block; margin-bottom:8px; font-size:13px;">Observações (Opcional)</label>
      <textarea id="transfObservacoes" class="form-input" rows="3" style="width:100%;" placeholder="Motivo da transferência, histórico relevante..."></textarea>
    </div>

    <div class="form-group" style="margin-bottom:24px;">
      <label style="color:#ccc; display:block; margin-bottom:8px; font-size:13px;">Anexar Documentos (Opcional)</label>
      <input type="file" id="transfAnexos" multiple class="form-input" style="width:100%;">
      <span style="font-size:11px; color:#666;">Formatos aceitos: PDF, JPG, PNG.</span>
    </div>

    <div style="display:flex; justify-content:flex-end; gap:12px;">
      <button class="btn-clear" onclick="fecharModalTransferencia()">Cancelar</button>
      <button class="btn" style="background:#3ea6ff; color:#000;" onclick="salvarSolicitacaoTransferencia()" id="btnSalvarTransferencia">
        Solicitar Transferência
      </button>
    </div>
  </div>
</div>
