<!-- CABEÇALHO DA TELA DE TURMAS -->
<div class="page-header">
  <h1>Turmas</h1>
  <div style="display:flex; gap:8px; align-items:center;">
    <button class="btn-add btn-modo-edicao-somente" id="btnNovaTurma" onclick="abrirModalTurma()" title="Criar nova turma" style="display: none;">+</button>
    <button class="btn-clear" onclick="voltarParaEscola()">Voltar</button>
  </div>
</div>

<div class="tools-row" style="display:flex; gap:8px;">
  <input type="search" id="buscaTurma" placeholder="Buscar turma por nome..." oninput="carregarTurmasDaTela()" style="flex:1;" />
  <select id="filtroTurno" onchange="carregarTurmasDaTela()" style="width: 150px;">
    <option value="">Todos os Turnos</option>
    <option value="Matutino">Matutino</option>
    <option value="Vespertino">Vespertino</option>
    <option value="Integral">Integral</option>
  </select>
  <select id="filtroAno" onchange="carregarTurmasDaTela()" style="width: 120px;">
    <!-- Anos letivos entrarão dinamicamente aqui -->
  </select>
</div>

<div class="turmas-grid" id="listaTurmas">
  <!-- JS vai injetar os cards das turmas aqui -->
</div>

<!-- ============================================
     HUB DE TURMA (painel com abas)
     ============================================ -->
<div class="hub-overlay" id="hubTurmaOverlay" onclick="fecharHubTurma(event)">
  <div class="hub-panel" onclick="event.stopPropagation()">
    <!-- TOPO FIXO -->
    <div class="hub-topo">
      <div class="hub-topo-row">
        <div>
          <h2 id="hubTurmaNome">Turma</h2>
          <p id="hubTurmaInfo"></p>
        </div>
        <button class="fechar" onclick="fecharHubTurma()" aria-label="Fechar">×</button>
      </div>
      <!-- ABAS -->
      <div class="hub-abas">
        <button class="hub-aba-btn ativa" id="aba-materias"   onclick="abrirAbaTurma('materias')"><i data-lucide="book-open" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom;margin-right:4px;"></i> Matérias</button>
        <button class="hub-aba-btn"       id="aba-alunos"     onclick="abrirAbaTurma('alunos')"><i data-lucide="users" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom;margin-right:4px;"></i> Alunos</button>
        <button class="hub-aba-btn"       id="aba-frequencia" onclick="abrirAbaTurma('frequencia')"><i data-lucide="calendar" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom;margin-right:4px;"></i> Frequência</button>
        <button class="hub-aba-btn"       id="aba-notas"      onclick="abrirAbaTurma('notas')"><i data-lucide="bar-chart-2" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom;margin-right:4px;"></i> Notas</button>
      </div>
    </div>

    <!-- CORPO DAS ABAS -->
    <div class="hub-corpo">

      <!-- ABA: MATÉRIAS -->
      <div id="conteudo-materias">
        <!-- Formulário de nova matéria (modo edição) -->
        <div id="formMateria" class="materia-form" style="display:none;">
          <div class="materia-form-titulo"><i data-lucide="plus" style="width:16px;height:16px;display:inline-block;vertical-align:text-bottom;margin-right:4px;"></i> Nova Matéria</div>
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom:10px;">
            <div>
              <label style="font-size:12px;color:#aaa;display:block;margin-bottom:4px;">Nome da Matéria *</label>
              <input type="text" id="inputNomeMateria" placeholder="Ex: Matemática, Português..." style="margin:0;" />
            </div>
            <div>
              <label style="font-size:12px;color:#aaa;display:block;margin-bottom:4px;">Professor Responsável</label>
              <select id="selectProfMateria" style="margin:0;"><option value="">-- Selecione --</option></select>
            </div>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn-login" onclick="salvarMateria()" style="width:auto;padding:10px 20px;margin:0;">Salvar Matéria</button>
            <button class="btn-clear" onclick="cancelarFormMateria()" style="width:auto;padding:10px 16px;">Cancelar</button>
          </div>
        </div>

        <!-- Botão adicionar (modo edição) -->
        <div id="btnAdicionarMateriaWrap" style="display:none; margin-bottom:14px;">
          <button class="btn-add" onclick="abrirFormMateria()" title="Adicionar matéria" style="width:auto;padding:8px 16px;font-size:14px;border-radius:10px;">+ Adicionar Matéria</button>
        </div>

        <!-- Lista de matérias -->
        <div id="listaMateriasTurma">
          <div class="hub-empty">Carregando matérias...</div>
        </div>
      </div>

      <!-- ABA: ALUNOS -->
      <div id="conteudo-alunos" style="display:none;">
        <div id="listaAlunosTurmaHub">
          <div class="hub-empty">Carregando alunos...</div>
        </div>
      </div>

      <!-- ABA: FREQUÊNCIA -->
      <div id="conteudo-frequencia" style="display:none;">
        <div style="display:flex; gap:10px; align-items:center; margin-bottom:16px; position:relative;">
          <input type="hidden" id="dataFrequenciaHub" />
          <div class="date-navigator" style="display:flex; align-items:center; background:#222; border-radius:8px; border:1px solid #3f3f3f;">
            <button class="btn-clear" onclick="mudarDiaFrequenciaHub(-1)" style="padding:6px 12px; border-right:1px solid #3f3f3f; border-radius:8px 0 0 8px;">◀</button>
            <div id="btnCalendarioFrequenciaHub" onclick="toggleCalendarioFrequenciaHub()" style="padding:6px 16px; cursor:pointer; font-weight:bold; font-size:14px; min-width:140px; text-align:center; color:#3ea6ff; user-select:none;"></div>
            <button class="btn-clear" onclick="mudarDiaFrequenciaHub(1)" style="padding:6px 12px; border-left:1px solid #3f3f3f; border-radius:0 8px 8px 0;">▶</button>
          </div>
          <button class="btn-clear" onclick="carregarFrequenciaHub()" style="display:flex; align-items:center; gap:4px;"><i data-lucide="refresh-cw" style="width:16px;height:16px;"></i> Atualizar</button>

          <!-- Pop-up do Calendário -->
          <div id="calendarioFrequenciaPopupHub" style="display:none; position:absolute; top:45px; left:0; background:#1e1e1e; border:1px solid #3f3f3f; border-radius:12px; padding:12px; box-shadow:0 8px 24px rgba(0,0,0,0.8); z-index:100; width:260px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
              <button class="btn-clear" onclick="mudarMesCalendarioFrequenciaHub(-1)" style="padding:4px 8px;">◀</button>
              <div id="labelMesAnoCalendarioFrequenciaHub" style="font-weight:bold; font-size:14px; color:#fff;"></div>
              <button class="btn-clear" onclick="mudarMesCalendarioFrequenciaHub(1)" style="padding:4px 8px;">▶</button>
            </div>
            <div style="display:grid; grid-template-columns:repeat(7,1fr); text-align:center; font-size:12px; color:#aaa; margin-bottom:6px; font-weight:bold;">
              <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
            </div>
            <div id="gridDiasCalendarioFrequenciaHub" style="display:grid; grid-template-columns:repeat(7,1fr); gap:4px; text-align:center; font-size:13px;">
            </div>
            <div style="margin-top:12px; text-align:center; border-top:1px solid #333; padding-top:8px;">
              <button class="btn-clear" onclick="selecionarHojeCalendarioFrequenciaHub()" style="color:#3ea6ff; font-size:12px; font-weight:bold;">Ir para Hoje</button>
            </div>
          </div>
        </div>
        <div id="avisoPermissaoFreqHub" class="aviso-permissao-freq" style="display:none;margin-bottom:12px;"></div>
        <div id="listaFrequenciaHub" style="display:flex;flex-direction:column;gap:8px;"></div>
        <button class="btn-login" id="btnSalvarFrequenciaHub" onclick="salvarFrequenciaHub()" style="margin-top:20px;display:none;">💾 Salvar Frequência</button>
      </div>

      <!-- ABA: NOTAS -->
      <div id="conteudo-notas" style="display:none;">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;">
          <span style="font-size:13px;color:#aaa;">Clique no cabeçalho da matéria para expandir e lançar notas por unidade.</span>
          <button class="btn-clear" onclick="carregarNotasHub()" style="margin-left:auto;">🔄 Atualizar</button>
          <button class="btn-login" id="btnSalvarNotasHub" onclick="salvarNotasHub()" style="display:none;width:auto;padding:8px 20px;margin:0;">💾 Salvar Notas</button>
        </div>
        <div id="listaNotesTurmaHub">
          <div class="hub-empty">Carregando notas...</div>
        </div>
      </div>

    </div><!-- fim hub-corpo -->
  </div><!-- fim hub-panel -->
</div><!-- fim hub-overlay -->

<!-- ============================================
     MODAL DE TURMA (criar/editar)
     ============================================ -->
<div class="modal" id="modalTurma">
  <div class="modal-box" style="max-width: 500px;">
    <div class="modal-topo">
      <h2 id="tituloModalTurma">Nova Turma</h2>
      <button class="fechar" onclick="fecharModalTurma()">×</button>
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
      <div>
        <label style="font-size: 12px; color: #aaa;">Nome da Turma *</label>
        <input type="text" id="nomeTurma" placeholder="Ex: 5º Ano B" style="margin: 4px 0 0;" />
      </div>
      <div>
        <label style="font-size: 12px; color: #aaa;">Ano Letivo *</label>
        <input type="number" id="anoTurma" placeholder="Ex: 2026" style="margin: 4px 0 0;" />
      </div>
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
      <div>
        <label style="font-size: 12px; color: #aaa;">Turno *</label>
        <select id="turnoTurma" style="margin: 4px 0 0;">
          <option value="Matutino">Matutino</option>
          <option value="Vespertino">Vespertino</option>
          <option value="Integral">Integral</option>
        </select>
      </div>
      <div>
        <label style="font-size: 12px; color: #aaa;">Capacidade de Alunos</label>
        <input type="number" id="capacidadeTurma" placeholder="Ex: 30" style="margin: 4px 0 0;" />
      </div>
    </div>

    <!-- SESSÃO DE MULTIPLOS PROFESSORES -->
    <div style="background: #1f1f1f; padding: 12px; border-radius: 8px; border: 1px solid #333; margin-bottom: 16px;">
      <label style="font-size: 13px; color: #fff; font-weight: bold; display: flex; align-items: center; gap: 6px; margin-bottom: 8px;"><i data-lucide="users" style="width:16px;height:16px;"></i> Professores da Turma</label>
      <div style="display: flex; gap: 8px; margin-bottom: 8px;">
        <select id="selectProfessorTurma" style="flex: 1; margin: 0;"></select>
        <button class="btn-login" onclick="adicionarProfessorNaTag()" style="width: auto; margin: 0; padding: 0 16px;">Adicionar</button>
      </div>
      <div class="professores-tags" id="tagsProfessores"></div>
    </div>

    <!-- SEÇÃO DE GESTÃO DE MATÉRIAS (Apenas no Modo Edição) -->
    <div id="secaoMateriasModalTurma" style="background: #1f1f1f; padding: 12px; border-radius: 8px; border: 1px solid #333; margin-bottom: 16px; display: none;">
      <label style="font-size: 13px; color: #fff; font-weight: bold; display: flex; align-items: center; gap: 6px; margin-bottom: 8px;"><i data-lucide="book-open" style="width:16px;height:16px;"></i> Matérias da Turma</label>
      
      <!-- Formulário de Nova Matéria no Modal -->
      <div id="formNovaMateriaModal" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; padding: 10px; background: #121212; border-radius: 6px; border: 1px dashed #444;">
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
          <input type="text" id="nomeMateriaModal" placeholder="Nome da Matéria (Ex: Português)" style="margin: 0; flex: 1; min-width: 150px;" />
          <select id="selectProfMateriaModal" style="margin: 0; flex: 1; min-width: 150px;"></select>
        </div>
        <button class="btn-login" onclick="salvarMateriaPeloModal()" style="width: auto; margin: 0; padding: 8px 16px; font-size: 13px; align-self: flex-start;">+ Adicionar Matéria</button>
      </div>

      <!-- Lista de Matérias Atuais -->
      <div id="listaMateriasModalTurma" style="display: flex; flex-direction: column; gap: 6px; max-height: 180px; overflow-y: auto;">
        <!-- Injetado via JS -->
      </div>
    </div>

    <button class="btn-login" id="btnSalvarTurma" onclick="salvarTurma()">Salvar Turma</button>
  </div>
</div>
