        <div class="page-header">
          <h1>Permissões</h1>
        </div>
        <div class="permissions-layout">
          <!-- Formulário -->
          <div class="permissions-box" id="boxFormPermissao">
            <h2>Atribuir acesso</h2>
            <input type="text" id="buscaFuncionarioSelect" placeholder="Pesquisar funcionário..." oninput="filtrarSelectFuncionario()" style="margin-bottom: 8px;" />
            <select id="funcionarioPermissao" style="margin-bottom: 12px;"></select>
            <select id="orgaoPermissao" style="margin-bottom: 12px;"></select>
            <select id="nivelPermissao" style="margin-bottom: 24px;" onchange="atualizarCamposPermissao()"></select>
            <div class="checks-permissoes" id="checksPermissoes" style="display: none; margin-bottom: 16px;">
              <label><input type="checkbox" id="permMural"> Mural</label>
              <label><input type="checkbox" id="permTurmas"> Turmas</label>
              <label><input type="checkbox" id="permFuncionarios"> Funcionários</label>
              <label><input type="checkbox" id="permMatriculas"> Matrículas</label>
              <label><input type="checkbox" id="permAlunos"> Alunos</label>
            </div>
            <button class="btn-login" type="button" onclick="salvarPermissao()" id="btnSalvarPermissao">Salvar permissão</button>
            <button class="btn-clear" type="button" onclick="cancelarEdicaoPermissao()" id="btnCancelarPermissao" style="display: none; width: 100%; margin-top: 8px;">Cancelar edição</button>
          </div>
          <!-- Lista -->
          <div class="permissions-box" style="grid-column: span 2;" id="boxListaPermissoes">
            <h2>Acessos cadastrados</h2>
            <div style="display: grid; grid-template-columns: 1fr 160px 220px auto; gap: 12px; margin-bottom: 18px; align-items: center;">
              <input type="search" id="buscaPermissao" placeholder="Buscar funcionário..." oninput="renderizarPermissoes()" />
              <select id="filtroNivelPermissao" onchange="renderizarPermissoes()">
                <option value="">Todos os Níveis</option>
                <option value="2">Nível 2</option>
                <option value="3">Nível 3</option>
                <option value="4">Nível 4</option>
              </select>
              <select id="filtroOrgaoPermissao" onchange="renderizarPermissoes()">
                <option value="">Todos os Órgãos</option>
              </select>
              <button class="btn-clear" onclick="limparFiltrosPermissao()">Limpar</button>
            </div>
            <div class="lista-alunos" id="listaPermissoes"></div>
          </div>
        </div>
