<div class="page-header">
  <h1>Meu Perfil</h1>
</div>

<div style="max-width: 800px; margin: 0 auto; padding: 20px;">
  
  <!-- DADOS DO USUÁRIO -->
  <div class="form-grid" style="background: #1f1f1f; padding: 24px; border-radius: 8px; border: 1px solid #333; margin-bottom: 24px;">
    <h2 style="grid-column: 1 / -1; margin-top: 0; margin-bottom: 16px; border-bottom: 1px solid #333; padding-bottom: 12px; font-size: 18px; color: #fff; display: flex; align-items: center; gap: 8px;">
      <i data-lucide="user"></i> Dados da Ficha Funcional
    </h2>

    <div style="grid-column: 1 / -1; display: flex; gap: 16px; align-items: flex-start;">
      <div id="perfilAvatar" style="width: 80px; height: 80px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #fff; flex-shrink: 0; overflow: hidden;">
        <i data-lucide="user" style="width: 40px; height: 40px;"></i>
      </div>
      <div style="flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; align-items: center;">
        <div>
          <span style="font-size: 12px; color: #888; display: block; margin-bottom: 4px;">Nome Completo</span>
          <strong id="perfilNome" style="color: #fff; font-size: 16px;">-</strong>
        </div>
        <div>
          <span style="font-size: 12px; color: #888; display: block; margin-bottom: 4px;">E-mail</span>
          <span id="perfilEmail" style="color: #fff; font-size: 14px;">-</span>
        </div>
        <div>
          <span style="font-size: 12px; color: #888; display: block; margin-bottom: 4px;">Cargo</span>
          <span id="perfilCargo" style="color: #fff; font-size: 14px; background: #333; padding: 4px 8px; border-radius: 4px;">-</span>
        </div>
        <div>
          <span style="font-size: 12px; color: #888; display: block; margin-bottom: 4px;">Telefone</span>
          <span id="perfilTelefone" style="color: #fff; font-size: 14px;">-</span>
        </div>
      </div>
    </div>
  </div>

  <!-- AVISO DE PRIMEIRO ACESSO -->
  <div style="background: #2563eb20; border-left: 4px solid #2563eb; padding: 16px; border-radius: 4px; margin-bottom: 24px; color: #dbeafe;">
    <h3 style="margin-top: 0; margin-bottom: 8px; font-size: 16px; display: flex; align-items: center; gap: 8px;">
      <i data-lucide="info" style="width: 18px; height: 18px;"></i> Recomendações de Segurança
    </h3>
    <p style="margin: 0; font-size: 14px; line-height: 1.5;">
      Se este é o seu primeiro acesso usando uma senha padrão fornecida pela secretaria, por favor, crie uma senha forte e pessoal abaixo.
    </p>
  </div>

  <!-- ALTERAR SENHA -->
  <div class="form-grid" style="background: #1f1f1f; padding: 24px; border-radius: 8px; border: 1px solid #333;">
    <h2 style="grid-column: 1 / -1; margin-top: 0; margin-bottom: 0; padding-bottom: 0; font-size: 18px; color: #fff; display: flex; align-items: center; justify-content: space-between; cursor: pointer;" onclick="const c = document.getElementById('senha-content'); const i = this.querySelector('.toggle-icon'); if (c.style.display === 'none') { c.style.display = 'grid'; i.style.transform = 'rotate(180deg)'; this.style.borderBottom = '1px solid #333'; this.style.paddingBottom = '12px'; this.style.marginBottom = '16px'; } else { c.style.display = 'none'; i.style.transform = 'rotate(0deg)'; this.style.borderBottom = 'none'; this.style.paddingBottom = '0'; this.style.marginBottom = '0'; }">
      <div style="display: flex; align-items: center; gap: 8px;">
        <i data-lucide="lock"></i> Alterar Senha de Acesso
      </div>
      <i data-lucide="chevron-down" class="toggle-icon" style="transition: transform 0.3s; width: 20px; height: 20px;"></i>
    </h2>

    <div id="senha-content" style="display: none; grid-column: 1 / -1; grid-template-columns: 1fr; gap: 16px;">
      
      <div class="form-group" style="grid-column: 1 / -1; margin-bottom: 0;">
        <div id="perfilAlert" style="display: none; padding: 12px; border-radius: 4px; font-size: 14px; align-items: center; gap: 8px;">
          <i id="perfilAlertIcon" data-lucide="alert-circle" style="width: 18px; height: 18px;"></i>
          <span id="perfilAlertText"></span>
        </div>
      </div>

      <div class="form-group" style="grid-column: 1 / -1;">
        <label for="senhaAtualPerfil">Senha Atual</label>
        <input type="password" id="senhaAtualPerfil" placeholder="Digite sua senha atual" />
      </div>

      <div class="form-group">
        <label for="novaSenhaPerfil">Nova Senha</label>
        <input type="password" id="novaSenhaPerfil" placeholder="Mínimo 6 caracteres" />
      </div>

      <div class="form-group">
        <label for="confirmaSenhaPerfil">Confirmar Nova Senha</label>
        <input type="password" id="confirmaSenhaPerfil" placeholder="Digite a nova senha novamente" />
      </div>

      <div style="grid-column: 1 / -1; display: flex; justify-content: flex-end; margin-top: 16px;">
        <button class="btn-salvar" id="btnSalvarSenha" onclick="atualizarSenhaPerfil()" style="display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: #2563eb; color: #fff; border: none; border-radius: 4px; cursor: pointer;">
          <i data-lucide="save" style="width: 18px; height: 18px;"></i> Atualizar Senha
        </button>
      </div>
    </div>
  </div>

</div>
